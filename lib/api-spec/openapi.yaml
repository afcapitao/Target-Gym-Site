openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      description: Submit a training session booking request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BookingInput:
      type: object
      required:
        - name
        - email
        - phone
        - service
        - preferredDate
        - preferredTime
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 9
        service:
          type: string
          enum:
            - personal-training
            - group-class
            - nutrition
            - online-training
        preferredDate:
          type: string
          description: "Preferred date in YYYY-MM-DD format"
        preferredTime:
          type: string
          description: "Preferred time slot, e.g. 07:00-08:00"
        message:
          type: ["string", "null"]

    Booking:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - service
        - preferredDate
        - preferredTime
        - status
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        service:
          type: string
        preferredDate:
          type: string
        preferredTime:
          type: string
        message:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
