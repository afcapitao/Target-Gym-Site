name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build libs
        run: pnpm run typecheck:libs
      - name: Build site
        run: pnpm --filter @workspace/target-gym run build:gh-pages
        env:
          GH_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Fix SPA routing
        run: cp artifacts/target-gym/dist/gh-pages/index.html artifacts/target-gym/dist/gh-pages/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/target-gym/dist/gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
